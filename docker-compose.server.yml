services:
  health-agent-bridge:
    build:
      context: .
    container_name: health-agent-bridge
    restart: unless-stopped
    env_file:
      - .env.server
    ports:
      - "127.0.0.1:8012:8000"
    volumes:
      - /home/mauro/Dev/openclaw-mauro/data/workspace/care:/app/agent-workspace
    networks:
      - openclaw_openclaw_net

networks:
  openclaw_openclaw_net:
    external: true
